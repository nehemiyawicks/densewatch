name: release

# On a version tag (e.g. v0.1.0), publish the densewatch-cdu image to GHCR so
# operators can run the conformance probe with no Go and no clone:
#   docker run --rm ghcr.io/nehemiyawicks/densewatch-cdu probe https://your-cdu/redfish/v1
on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  publish-cdu-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          build-args: TARGET=exporters/cdu
          push: true
          tags: |
            ghcr.io/nehemiyawicks/densewatch-cdu:latest
            ghcr.io/nehemiyawicks/densewatch-cdu:${{ github.ref_name }}
