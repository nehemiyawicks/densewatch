global:
  scrape_interval: 5s

scrape_configs:
  # Unified CDU telemetry from densewatch-cdu (Redfish + Modbus, normalized).
  - job_name: densewatch-cdu
    static_configs:
      - targets: ["cdu-exporter:9839"]

  # dcgm-style GPU metrics straight from the simulator (hpc_job correlation key).
  - job_name: dcgm
    static_configs:
      - targets: ["sim:9400"]

  # Topology join-key metrics (node -> rack -> cdu) from densewatch-correlate.
  - job_name: densewatch-correlate
    static_configs:
      - targets: ["correlator:9840"]
